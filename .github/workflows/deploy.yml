name: Deploy Milkman

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Validate deploy secrets
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
          VM_APP_DIR: ${{ secrets.VM_APP_DIR }}
        run: |
          test -n "$VM_HOST" || { echo "::error::Missing GitHub secret VM_HOST"; exit 1; }
          test -n "$VM_USER" || { echo "::error::Missing GitHub secret VM_USER"; exit 1; }
          test -n "$VM_SSH_KEY" || { echo "::error::Missing GitHub secret VM_SSH_KEY"; exit 1; }
          test -n "$VM_APP_DIR" || { echo "::error::Missing GitHub secret VM_APP_DIR"; exit 1; }

      - name: Deploy on Azure VM over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT || 22 }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e

            APP_DIR="${{ secrets.VM_APP_DIR }}"

            if [ -z "$APP_DIR" ]; then
              echo "VM_APP_DIR secret is required."
              exit 1
            fi

            cd "$APP_DIR"

            echo "[1/6] Updating repository"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            echo "[2/6] Backend dependencies"
            if [ ! -d venv ]; then
              python3 -m venv venv
            fi
            . venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt

            echo "[3/6] Django migrate + static"
            python manage.py migrate --noinput
            python manage.py collectstatic --noinput

            echo "[4/6] Restart backend service"
            sudo systemctl restart milkman
            sudo systemctl status milkman --no-pager --lines=10

            echo "[5/6] Build frontend"
            cd frontend-app
            npm ci
            npm run build

            echo "[6/6] Publish frontend + reload nginx"
            sudo rsync -av --delete dist/ /var/www/milkman-frontend/
            sudo nginx -t && sudo systemctl reload nginx
            sudo systemctl reload nginx
